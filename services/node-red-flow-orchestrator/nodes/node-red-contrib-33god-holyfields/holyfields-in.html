<script type="text/javascript">
  (function () {
    function esc(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    RED.nodes.registerType("holyfields-in", {
      category: "33GOD",
      color: "#C8E6C9",
      defaults: {
        name: { value: "" },
        catalogMode: { value: "vetted" },
        schemaPath: { value: "" },
        validationMode: { value: "warn" },
        rabbitUrl: { value: "amqp://127.0.0.1:5672/" },
        exchange: { value: "bloodbank.events.v1" },
        routingKey: { value: "#" },
        queueName: { value: "" },
        outputMode: { value: "envelope" },
      },
      inputs: 0,
      outputs: 1,
      icon: "font-awesome/fa-sign-in",
      paletteLabel: "holyfields in",
      label: function () {
        return this.name || "holyfields in";
      },
      oneditprepare: function () {
        const node = this;
        const $catalogMode = $("#node-input-catalogMode");
        const $schemaPath = $("#node-input-schemaPath");
        const $routingKey = $("#node-input-routingKey");
        const $meta = $("#hf-in-schema-meta");

        function loadCatalog() {
          const mode = $catalogMode.val() || "vetted";
          $.getJSON("holyfields/schemas", { mode }, function (resp) {
            const schemas = (resp && resp.schemas) || [];

            $schemaPath.empty();
            $schemaPath.append(`<option value="">-- Optional schema validation --</option>`);
            schemas.forEach((schema) => {
              const selected = schema.schemaPath === node.schemaPath ? "selected" : "";
              const label = `[${schema.kind}] ${schema.eventType} — ${schema.schemaPath}`;
              $schemaPath.append(`<option value="${esc(schema.schemaPath)}" ${selected}>${esc(label)}</option>`);
            });

            const selected = $schemaPath.val() || node.schemaPath;
            if (selected) $schemaPath.val(selected);
            if (selected) loadSchemaMeta(selected);
          }).fail(function (err) {
            $meta.text(`Catalog fetch failed: ${err.status || "?"}`);
          });
        }

        function loadSchemaMeta(schemaPath) {
          if (!schemaPath) {
            $meta.text("No schema selected (validation disabled)");
            return;
          }

          $.getJSON("holyfields/schema", { path: schemaPath }, function (resp) {
            if (!resp || !resp.ok || !resp.schema) {
              $meta.text("Failed to load schema details");
              return;
            }

            const schema = resp.schema;
            $meta.html(
              `<b>${esc(schema.title)}</b><br>` +
              `<span style='color:#666'>${esc(schema.eventType)} (${esc(schema.kind)})</span>`
            );

            if (!$routingKey.val() || $routingKey.val() === "#") {
              if (schema.schemaPath === "command/envelope.v1.json") {
                $routingKey.val("command.#");
              } else {
                $routingKey.val(schema.eventType);
              }
            }
          });
        }

        $catalogMode.on("change", loadCatalog);
        $schemaPath.on("change", function () {
          loadSchemaMeta($(this).val());
        });

        loadCatalog();
      },
    });
  })();
</script>

<script type="text/html" data-template-name="holyfields-in">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
    <input type="text" id="node-input-name" placeholder="holyfields in">
  </div>

  <div class="form-row">
    <label for="node-input-catalogMode"><i class="fa fa-filter"></i> Catalog</label>
    <select id="node-input-catalogMode">
      <option value="vetted">Vetted only</option>
      <option value="all">All schemas</option>
    </select>
  </div>

  <div class="form-row">
    <label for="node-input-schemaPath"><i class="fa fa-book"></i> Schema</label>
    <select id="node-input-schemaPath"></select>
  </div>

  <div class="form-row">
    <div id="hf-in-schema-meta" class="form-tips">Loading schema catalog…</div>
  </div>

  <div class="form-row">
    <label for="node-input-validationMode"><i class="fa fa-check-circle"></i> Validation</label>
    <select id="node-input-validationMode">
      <option value="warn">warn (forward + annotate)</option>
      <option value="strict">strict (drop invalid)</option>
      <option value="off">off</option>
    </select>
  </div>

  <div class="form-row">
    <label for="node-input-rabbitUrl"><i class="fa fa-plug"></i> Rabbit URL</label>
    <input type="text" id="node-input-rabbitUrl" placeholder="amqp://127.0.0.1:5672/">
  </div>

  <div class="form-row">
    <label for="node-input-exchange"><i class="fa fa-exchange"></i> Exchange</label>
    <input type="text" id="node-input-exchange" placeholder="bloodbank.events.v1">
  </div>

  <div class="form-row">
    <label for="node-input-routingKey"><i class="fa fa-random"></i> Routing key</label>
    <input type="text" id="node-input-routingKey" placeholder="#">
  </div>

  <div class="form-row">
    <label for="node-input-queueName"><i class="fa fa-inbox"></i> Queue name</label>
    <input type="text" id="node-input-queueName" placeholder="(blank = ephemeral auto queue)">
  </div>

  <div class="form-row">
    <label for="node-input-outputMode"><i class="fa fa-arrow-right"></i> Output</label>
    <select id="node-input-outputMode">
      <option value="envelope">envelope (msg.payload = envelope)</option>
      <option value="payload">payload only (msg.payload = envelope.payload)</option>
    </select>
  </div>
</script>

<script type="text/html" data-help-name="holyfields-in">
  <p><b>holyfields in</b> subscribes to Bloodbank (RabbitMQ) and optionally validates messages against a Holyfields schema.</p>

  <h3>Features</h3>
  <ul>
    <li>Routing-key based consumption (<code>#</code>, <code>command.#</code>, etc.)</li>
    <li>Optional schema validation (warn/strict/off)</li>
    <li>Envelope or payload output modes</li>
    <li>Ephemeral queue by default (or durable queue when queue name provided)</li>
  </ul>

  <h3>Validation modes</h3>
  <ul>
    <li><b>warn</b>: forwards message and adds validation details in <code>msg.holyfields.validation</code></li>
    <li><b>strict</b>: drops invalid messages</li>
    <li><b>off</b>: no schema validation</li>
  </ul>
</script>
